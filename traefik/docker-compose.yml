# NOTA: Docker Provider eliminado por incompatibilidad Docker 29.x (API mínima 1.40).
# Traefik v3.3 + File Provider. Rutas en config/dynamic.yaml.
# Fix aplicado 2026-05-04 — ver Contexto_DevOps.md sección Incidente 521.

services:
  traefik:
    image: traefik:v3.3
    container_name: pose_gateway
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    command:
      - "--api.insecure=false"
      - "--providers.file.directory=/config"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # ACME HTTP-01 (TLS-ALPN-01 incompatible con Cloudflare proxy)
      - "--certificatesresolvers.myresolver.acme.httpChallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpChallenge.entryPoint=web"
      - "--certificatesresolvers.myresolver.acme.email=Richard.r.ia86@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "./config:/config:ro"
    networks:
      - pose_network

networks:
  pose_network:
    external: true
