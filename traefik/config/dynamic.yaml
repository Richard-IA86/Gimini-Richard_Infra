# Configuración dinámica de Traefik — File Provider
# Reemplaza al Docker Provider (incompatible con Docker 29.x).
# Rutas hardcodeadas hacia los backends de la red pose_network.

http:
  routers:
    api:
      rule: "Host(`api.gestionpose.com.ar`)"
      service: api-svc
      entryPoints:
        - websecure
      tls:
        certResolver: myresolver

    frontend:
      rule: "Host(`gestionpose.com.ar`) || Host(`www.gestionpose.com.ar`)"
      service: frontend-svc
      entryPoints:
        - websecure
      tls:
        certResolver: myresolver

    http-redirect:
      rule: "HostRegexp(`{host:.+}`)"
      entryPoints:
        - web
      middlewares:
        - redirect-to-https
      service: noop@internal

  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    api-svc:
      loadBalancer:
        servers:
          - url: "http://pose_api:8000"

    frontend-svc:
      loadBalancer:
        servers:
          - url: "http://pose_frontend:3000"
